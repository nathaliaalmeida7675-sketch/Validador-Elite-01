name: Fábrica_de_Lucro_01

on:
  schedule:
    - cron: '0 * * * *'    # Bate o ponto sozinho a cada 1 hora (no minuto 0)
  workflow_dispatch:      # Deixa que você ligue na mão agora se quiser

jobs:
  trabalhar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Executar Minerador
        env:
          STREAMR_PRIVATE_KEY: ${{ secrets.STREAMR_PRIVATE_KEY }}
        run: python bot_vitoria.py
